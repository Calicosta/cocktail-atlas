<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="Submit your favourite cocktail or your own original recipe to The Cocktail Atlas.">
    <meta name="keywords" content="cocktails, mixology, cocktail recipes, drinks, bartending, cocktail atlas">
    <link rel="stylesheet" href="CocktailAtlas.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Open+Sans:wght@300;400;600&display=swap"
    rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="images/icon1.png">
</head>

<body>
    <div id="wrapper">
    <header><h1>The Cocktail Atlas</h1></header>
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="cocktails.html">Cocktails</a></li>

    <main class="contact-page">

        <h2>Your Cocktail at CocktailAtlas</h2>
        <p>Share your favourite cocktail or your own original recipe with The Cocktail Atlas.
            Selected submissions may be featured on the website.
        </p>
        <form action="confirmation.html" method="get" class="cocktail-form">

            <label for="fullname">Full Name:</label>
            <input type="text" id="fullname" name="fullname" required>

            <label for="email">Email Address:</label>
            <input type="email" id="email" name="email" required>

            <label for="cocktailname">Cocktail Name:</label>
            <input type="text" id="cocktailname" name="cocktailname" required>

            <label for="country">Country of Origin:</label>
            <input type="text" id="country" name="country">

            <label for="type">Type of Submission:</label>
            <select id="type" name="type" required>
                <option value="">Please select</option>
                <option value="Favourite">Favourite Cocktail</option>
                <option value="Original">Original Cocktail</option>
            </select>

            <label for="ingredients">Ingredients:</label>
            <textarea id="ingredients" name="ingredients" rows="4" required></textarea>
            <label for="method">Method:</label>
            <textarea id="method" name="method" rows="4" required></textarea>

            <label for="story">Why is this cocktail special?</label>
            <textarea id="story" name="story" rows="3"></textarea>

            <div class="checkbox">
                <input type="checkbox" id="confirm" name="confirm" required>
                <label for="confirm">I confirm this submission is appropriate and accurate</label>
            </div>

            <input type="submit" value="Submit Cocktail">

        </form>
    </main>

    <footer>
        Copyright &copy; 2026 The Cocktail Atlas

        <div class="social-icons">
        <a href="https://instagram.com" target="_blank">
            <img src="images/insta.png" alt="Instagram">
        </a>
        <a href="mailto:thecocktailatlas@gmail.com">
            <img src="images/email.png" alt="Email">
        </a>
        </div>
    </footer>
</div>
    <div id="tip-button" title="Mixology Tip">🍸</div>
    <div id="tip-popup"></div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="script.js"></script>
 
</body>
</html>
